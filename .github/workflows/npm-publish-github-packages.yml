# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
  release:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 20
      - run: yarn --immutable
      - run: make
      - run: yarn build
      - run: yarn typedoc src/
      - run: yarn tsc -b --verbose
      # - run: yarn test
      - run: yarn pack
      - run: ls dist*
      - run: tar xvzf package.tgz
      - run: npx publint --strict

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC
    env:
      NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          cache: yarn
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@mause"
      - run: yarn --immutable
      - run: |
          npm version "${{ github.event.release.tag_name || 'v0.0.0' }}" --no-git-tag-version
          npm version
      - run: yarn build
      - run: yarn pack
      # - run: npm publish package.tgz --dry-run --provenance --access public --verbose --tag test
      - if: github.event_name == 'release'
        run: |
          npm publish package.tgz --provenance --access public --verbose
